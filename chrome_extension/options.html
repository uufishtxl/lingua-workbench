<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Options - Lingua Workbench</title>
  <style>
    body { font-family: sans-serif; padding: 20px; width: 300px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; background: #2563eb; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; color: green; font-size: 0.9em; }
  </style>
</head>
<body>
  <h3>Settings</h3>
  <div class="form-group">
    <label for="apiUrl">API Base URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="e.g. http://localhost:8000">
  </div>
  <div class="form-group">
    <label for="apiToken">API Token (Optional)</label>
    <input type="password" id="apiToken" placeholder="Leave empty for Cookie auth">
  </div>
  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
