<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Lingua Workbench Reader</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            margin: 0;
        }

        .logo {
            font-size: 28px;
            margin-bottom: 5px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
            opacity: 0.8;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #4b5563;
            min-height: 20px;
            word-break: break-word;
        }

        .error {
            color: #dc2626 !important;
            font-weight: 500;
        }

        .success {
            color: #16a34a !important;
            font-weight: 500;
        }

        #settings-link {
            margin-top: 15px;
            font-size: 12px;
            color: #6b7280;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
        }

        #settings-link:hover {
            color: #374151;
        }
    </style>
</head>

<body>
    <div class="logo">📖</div>
    <h3 style="margin-top:0; color: #1f2937;">Save to Lingua</h3>
    <button id="extractBtn">Extract & Save Article</button>
    <div id="status">Ready</div>
    <div id="settings-link">Extension Settings</div>
    <script src="popup.js"></script>
</body>

</html>
